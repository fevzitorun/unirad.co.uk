name: Deploy Plugins to unirad.co.uk

on:
  push:
    branches:
      - main
    paths:
      - 'unirad-*.php'
      - 'unirad-*/**'

jobs:
  deploy:
    name: FTP Deploy to cPanel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # needed to detect changed files

      - name: Deploy changed plugin files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:           ftp.unirad.co.uk
          username:         ${{ secrets.FTP_USER }}
          password:         ${{ secrets.FTP_PASS }}
          port:             21
          protocol:         ftp
          server-dir:       public_html/wp-content/plugins/
          local-dir:        ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            *.md
            *.txt
          # Only upload files, never delete existing WP plugins
          dangerous-clean-slate: false
          log-level:        minimal
